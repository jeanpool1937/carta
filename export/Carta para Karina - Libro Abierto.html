document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

fc2e-e687-4907-89a2-f52a5f3ecd5a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Pinyon Script';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"ec96209a-f41b-48f7-86e9-021ae9c4596b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Pinyon Script';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"7205276d-def6-4077-898e-ffb6ecaba8f3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root{\n    --bg: #1a0f2a;\n    --bg-deep: #0f0720;\n    --page: #2a1a42;\n    --page-soft: #361f52;\n    --ink: #efe4f5;\n    --ink-soft: #c3a9d4;\n    --violet: #a97bc9;\n    --violet-bright: #d4a9e8;\n    --gold: #d4b572;\n    --gold-soft: #b89a5e;\n    --rule: rgba(212, 181, 114, 0.3);\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{\n    background: var(--bg-deep);\n    color: var(--ink);\n    font-family: 'EB Garamond', serif;\n    min-height: 100vh;\n    overflow-x: hidden;\n  }\n  body{\n    background:\n      radial-gradient(ellipse at 20% 10%, rgba(169, 123, 201, 0.18) 0%, transparent 50%),\n      radial-gradient(ellipse at 80% 90%, rgba(212, 181, 114, 0.1) 0%, transparent 55%),\n      linear-gradient(160deg, #1a0f2a 0%, #0f0720 100%);\n    background-attachment: fixed;\n  }\n\n  /* subtle stars */\n  body::before{\n    content:\"\"; position: fixed; inset:0;\n    background-image:\n      radial-gradient(1px 1px at 13% 22%, rgba(255,255,255,0.6), transparent),\n      radial-gradient(1px 1px at 47% 68%, rgba(255,255,255,0.4), transparent),\n      radial-gradient(1px 1px at 82% 18%, rgba(212, 181, 114, 0.5), transparent),\n      radial-gradient(1px 1px at 29% 85%, rgba(255,255,255,0.5), transparent),\n      radial-gradient(1px 1px at 71% 45%, rgba(212, 181, 114, 0.4), transparent),\n      radial-gradient(1.5px 1.5px at 90% 72%, rgba(255,255,255,0.35), transparent);\n    background-size: 600px 600px;\n    pointer-events: none;\n    z-index: 1;\n  }\n\n  .nav{\n    position: fixed; top: 20px; left: 20px; z-index: 40;\n    font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase;\n    color: var(--gold);\n  }\n  .nav a{\n    color: inherit; text-decoration: none;\n    padding: 8px 14px;\n    border: 1px solid var(--rule);\n    background: rgba(26, 15, 42, 0.7);\n    backdrop-filter: blur(6px);\n    transition: all .3s;\n  }\n  .nav a:hover{ background: var(--gold); color: var(--bg-deep); }\n\n  .book-counter{\n    position: fixed; top: 20px; right: 20px; z-index: 40;\n    font-family: 'Cormorant Garamond', serif;\n    font-style: italic;\n    font-size: 15px;\n    color: var(--gold);\n    letter-spacing: 0.2em;\n    background: rgba(26, 15, 42, 0.7);\n    padding: 8px 16px;\n    border: 1px solid var(--rule);\n    backdrop-filter: blur(6px);\n  }\n\n  .stage{\n    min-height: 100vh;\n    display: flex;\n    align-items: flex-start;\n    justify-content: center;\n    padding: 70px 24px 120px;\n    position: relative;\n    z-index: 10;\n  }\n\n  .book{\n    width: min(1400px, 96vw);\n    background:\n      linear-gradient(90deg,\n        var(--page-soft) 0%,\n        var(--page) 48%,\n        #0a0415 50%,\n        var(--page) 52%,\n        var(--page-soft) 100%);\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    box-shadow:\n      0 60px 120px rgba(0,0,0,0.6),\n      0 0 0 1px rgba(212, 181, 114, 0.15),\n      inset 0 0 80px rgba(0,0,0,0.4);\n    position: relative;\n    border-radius: 4px;\n    overflow: hidden;\n  }\n\n  /* book binding shadow */\n  .book::before{\n    content:\"\"; position:absolute;\n    top: 0; bottom: 0; left: 50%;\n    width: 40px; transform: translateX(-50%);\n    background:\n      linear-gradient(90deg,\n        transparent 0%,\n        rgba(0,0,0,0.5) 30%,\n        rgba(0,0,0,0.7) 50%,\n        rgba(0,0,0,0.5) 70%,\n        transparent 100%);\n    pointer-events: none;\n    z-index: 5;\n  }\n\n  .page-side{\n    padding: 56px 56px 64px;\n    position: relative;\n    display: flex;\n    flex-direction: column;\n    min-height: 0;\n  }\n\n  .page-left{ border-right: 1px solid rgba(212, 181, 114, 0.12); }\n\n  .page-num{\n    margin-top: auto;\n    padding-top: 32px;\n    font-family: 'Cormorant Garamond', serif;\n    font-style: italic;\n    font-size: 14px;\n    color: var(--gold);\n    letter-spacing: 0.3em;\n    opacity: 0.9;\n  }\n  .page-left .page-num{ text-align: right; }\n  .page-right .page-num{ text-align: left; }\n\n  .chapter-label{\n    font-family: 'EB Garamond', serif;\n    font-style: italic;\n    font-size: 13px;\n    letter-spacing: 0.4em;\n    text-transform: uppercase;\n    color: var(--gold);\n    margin-bottom: 24px;\n    display:flex; align-items:center; gap: 12px;\n  }\n  .chapter-label::after{\n    content:\"\"; flex:1; height:1px; background: var(--rule);\n  }\n\n  h1.book-title{\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 500;\n    font-size: 60px;\n    line-height: 1;\n    color: var(--violet-bright);\n    letter-spacing: -0.02em;\n    margin-bottom: 4px;\n  }\n  h1.book-title em{\n    font-family: 'Pinyon Script', cursive;\n    font-style: normal;\n    font-size: 88px;\n    color: var(--gold);\n    display:block;\n    line-height: 0.8;\n    margin-top: 8px;\n  }\n\n  .subtitle{\n    font-family: 'Cormorant Garamond', serif;\n    font-style: italic;\n    font-size: 18px;\n    color: var(--ink-soft);\n    margin-top: 20px;\n    line-height: 1.4;\n  }\n\n  .flourish{\n    text-align: center;\n    font-size: 22px;\n    letter-spacing: 0.8em;\n    color: var(--gold);\n    margin: 28px 0;\n    opacity: 0.7;\n  }\n\n  h2.chapter-title{\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 500;\n    font-size: 38px;\n    line-height: 1.1;\n    color: var(--violet-bright);\n    margin-bottom: 32px;\n    letter-spacing: -0.01em;\n    clear: both;\n  }\n  h2.chapter-title em{\n    font-style: italic;\n    color: var(--gold);\n  }\n\n  p.prose{\n    font-size: 16.5px;\n    line-height: 1.7;\n    margin-bottom: 14px;\n    color: var(--ink);\n    text-align: justify;\n    hyphens: auto;\n    text-wrap: pretty;\n  }\n  p.prose em{ color: var(--gold); font-style: italic; }\n  p.prose strong{ color: var(--violet-bright); font-weight: 500; }\n\n  .drop-cap::first-letter{\n    font-family: 'Pinyon Script', cursive;\n    font-size: 80px;\n    float: left;\n    line-height: 0.75;\n    margin: 8px 12px 0 0;\n    color: var(--gold);\n  }\n\n  .portrait{\n    width: 100%;\n    aspect-ratio: 16 / 9;\n    background:\n      repeating-linear-gradient(\n        35deg,\n        #361f52 0 14px,\n        #432866 14px 28px);\n    border: 1px solid var(--rule);\n    display:flex; align-items: flex-end; justify-content: center;\n    padding: 20px;\n    margin-bottom: 24px;\n    position: relative;\n  }\n  .portrait::before{\n    content:\"\"; position: absolute; inset: 10px;\n    border: 1px solid rgba(212, 181, 114, 0.25);\n  }\n  .portrait span{\n    font-family: 'Courier New', monospace;\n    font-size: 11px;\n    letter-spacing: 0.2em;\n    color: var(--gold);\n    background: rgba(15, 7, 32, 0.7);\n    padding: 4px 10px;\n  }\n\n  .verse-card{\n    margin: 40px 0;\n    padding: 32px 28px;\n    border-top: 1px solid var(--rule);\n    border-bottom: 1px solid var(--rule);\n    text-align: center;\n  }\n  .verse-card .q{\n    font-family: 'Cormorant Garamond', serif;\n    font-style: italic;\n    font-size: 26px;\n    line-height: 1.35;\n    color: var(--gold);\n    margin-bottom: 14px;\n  }\n  .verse-card .c{\n    font-size: 12px; letter-spacing: 0.35em; text-transform: uppercase;\n    color: var(--ink-soft);\n  }\n\n  .signature-closer{\n    text-align: center;\n    padding: 40px 0 20px;\n  }\n  .signature-closer .closing-line{\n    font-family: 'Cormorant Garamond', serif;\n    font-style: italic;\n    font-size: 24px;\n    color: var(--ink-soft);\n    margin-bottom: 20px;\n  }\n  .signature-closer .big-name{\n    font-family: 'Pinyon Script', cursive;\n    font-size: 140px;\n    line-height: 0.8;\n    color: var(--gold);\n    transform: rotate(-3deg);\n    display: inline-block;\n  }\n  .signature-closer .forever{\n    margin-top: 24px;\n    font-family: 'Cormorant Garamond', serif;\n    font-style: italic;\n    font-size: 17px;\n    letter-spacing: 0.3em;\n    text-transform: uppercase;\n    color: var(--violet);\n  }\n\n  /* Controls */\n  .controls{\n    position: fixed;\n    bottom: 28px; left: 50%; transform: translateX(-50%);\n    z-index: 30;\n    display:flex; gap: 10px; align-items: center;\n    background: rgba(15, 7, 32, 0.85);\n    border: 1px solid var(--rule);\n    padding: 10px 14px;\n    border-radius: 40px;\n    backdrop-filter: blur(10px);\n  }\n  .controls button{\n    background: transparent;\n    border: 1px solid var(--rule);\n    color: var(--gold);\n    font-family: 'Cormorant Garamond', serif;\n    font-size: 14px;\n    letter-spacing: 0.25em;\n    text-transform: uppercase;\n    padding: 8px 20px;\n    cursor: pointer;\n    border-radius: 40px;\n    transition: all .3s;\n  }\n  .controls button:hover:not(:disabled){ background: var(--gold); color: var(--bg-deep); }\n  .controls button:disabled{ opacity: .25; cursor: not-allowed; }\n  .controls .dots{ display:flex; gap: 8px; padding: 0 8px; }\n  .controls .dot{\n    width: 7px; height: 7px; border-radius: 50%;\n    background: rgba(212, 181, 114, 0.3);\n    transition: all .3s;\n  }\n  .controls .dot.active{ background: var(--gold); transform: scale(1.4); }\n\n  .spread{ display: none; }\n  .spread.active{ display: contents; }\n\n  /* fade transition */\n  .book.turning .page-side{ opacity: 0; transition: opacity .3s; }\n\n  .portrait{ margin-bottom: 16px; max-height: 180px; }\n  .verse-card{ margin: 24px 0; padding: 22px 18px; }\n  .verse-card .q{ font-size: 22px; }\n  .flourish{ margin: 18px 0; }\n  .signature-closer{ padding: 20px 0 10px; }\n  .signature-closer .big-name{ font-size: 110px; }\n  .signature-closer .closing-line{ font-size: 20px; margin-bottom: 10px; }\n\n  @media (max-width: 900px){\n    .book{\n      aspect-ratio: auto;\n      max-height: none;\n      grid-template-columns: 1fr;\n    }\n    .book::before{ display: none; }\n    .page-left{ border-right: none; border-bottom: 1px solid var(--rule); }\n    .page-side{ padding: 40px 28px; }\n    h1.book-title{ font-size: 48px; }\n    h1.book-title em{ font-size: 72px; }\n    h2.chapter-title{ font-size: 32px; }\n    .signature-closer .big-name{ font-size: 96px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"nav\"><a href=\"#\" onclick=\"return false\" style=\"display:none\">← Volver<\u002Fa><\u002Fdiv>\n<div class=\"book-counter\" id=\"counter\">Capítulo I · II<\u002Fdiv>\n\n<div class=\"stage\">\n  <div class=\"book\" id=\"book\">\n\n    <!-- SPREAD 1: Portada + inicio -->\n    <div class=\"spread active\" data-spread=\"0\">\n      <div class=\"page-side page-left\">\n        <div class=\"chapter-label\">Prólogo<\u002Fdiv>\n        <h1 class=\"book-title\">\n          Amada mía,\n          <em>Karina<\u002Fem>\n        <\u002Fh1>\n        <p class=\"subtitle\">Una carta a la dueña de mi corazón — escrita por quien, de todo el amor que Dios ha puesto en ti, es el mayor beneficiado.<\u002Fp>\n        <div class=\"flourish\">❦ · ❦ · ❦<\u002Fdiv>\n        <div class=\"portrait\"><span>foto · nosotros<\u002Fspan><\u002Fdiv>\n        <div class=\"page-num\">— i —<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page-side page-right\">\n        <div class=\"chapter-label\">Capítulo I · El don de tu entrega<\u002Fdiv>\n        <h2 class=\"chapter-title\">Te has ganado <em>mi respeto<\u002Fem> y admiración.<\u002Fh2>\n        <p class=\"prose drop-cap\">Tienes toda mi atención. Eres tú la razón por la que me esfuerzo cada día; por ti trabajo incansablemente, porque mi mayor deseo en esta vida es <em>hacerte feliz<\u002Fem>.<\u002Fp>\n        <p class=\"prose\">A tu lado he aprendido el verdadero significado del amor. Me has enseñado, con tu propio ejemplo, que <strong>el amor es sacrificial<\u002Fstrong>. Veo tu entrega a diario; sé que, a pesar de tu dolor de espalda, sigues adelante sin rendirte.<\u002Fp>\n        <p class=\"prose\">No te quejas, sino que, aun en medio de tu malestar, eres capaz de regalar tu sonrisa y servir a los demás. Eso, mi amor, es un <em>nivel de amor superior<\u002Fem>.<\u002Fp>\n        <div class=\"page-num\">— 1 —<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SPREAD 2: Guerrera + bendición -->\n    <div class=\"spread\" data-spread=\"1\">\n      <div class=\"page-side page-left\">\n        <div class=\"chapter-label\">Capítulo II · Mi compañera guerrera<\u002Fdiv>\n        <h2 class=\"chapter-title\">Hemos atravesado <em>tantas pruebas<\u002Fem> juntos.<\u002Fh2>\n        <p class=\"prose drop-cap\">En cada batalla has demostrado ser mi compañera guerrera. Me siento profundamente orgulloso de ti. Mi anhelo es verte brillar y destacar en todo lo que haces.<\u002Fp>\n        <p class=\"prose\">Veo con gran admiración tu crecimiento en el <strong>escuadrón de oración<\u002Fstrong> y me encanta que seas un instrumento tan hermoso en las manos del Señor.<\u002Fp>\n        <p class=\"prose\">Sé que a veces te preocupas por mi, pero confía en que Dios, en Su tiempo perfecto, me pondrá también dentro del equipo.<\u002Fp>\n        <div class=\"page-num\">— 2 —<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page-side page-right\">\n        <div class=\"chapter-label\">Capítulo III · Instrumento de gracia<\u002Fdiv>\n        <h2 class=\"chapter-title\">Eres mi <em>bendición<\u002Fem> más grande.<\u002Fh2>\n        <p class=\"prose drop-cap\">Tu nivel de entrega te capacita para ser un instrumento de gracia cada vez mayor. Lo eres para todas las personas a las que sirves y ministras con ese corazón tan entregado.<\u002Fp>\n        <p class=\"prose\">Me sigues enseñando a amar al ver cómo te entregas sin pensar en el beneficio propio, sino en el de los demás. Admiro profundamente cómo te despojas de ti misma para bendecir a otros, como a <em>Dayana<\u002Fem> o a <em>Naomi<\u002Fem>; eres capaz de hacerles un bien que quizás nunca recibas de vuelta.<\u002Fp>\n        <p class=\"prose\">Eso es <strong>amor incondicional puro<\u002Fstrong>. Y reconozco, con inmensa gratitud, que de todo ese amor que Dios ha puesto en tu corazón, <em>yo soy el mayor beneficiado<\u002Fem>.<\u002Fp>\n        <div class=\"page-num\">— 3 —<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SPREAD 3: Versículo + promesa + firma -->\n    <div class=\"spread\" data-spread=\"2\">\n      <div class=\"page-side page-left\">\n        <div class=\"chapter-label\">Interludio · Cantares<\u002Fdiv>\n        <div class=\"verse-card\" style=\"margin-top: 80px;\">\n          <div class=\"q\">«Toda tú eres hermosa,<br>amada mía,<br>y en ti no hay mancha.»<\u002Fdiv>\n          <div class=\"c\">Cantares 4:7<\u002Fdiv>\n        <\u002Fdiv>\n        <h2 class=\"chapter-title\" style=\"margin-top: 48px; text-align:center;\">Vuela, <em>amada mía<\u002Fem>.<\u002Fh2>\n        <p class=\"prose\" style=\"text-align:center; font-style: italic;\">Extiende tus alas sobre los montes y deja que el mundo vea la semilla que fue sembrada, que murió a sí misma para llevar mucho fruto.<\u002Fp>\n        <div class=\"page-num\">— 4 —<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"page-side page-right\">\n        <div class=\"chapter-label\">Epílogo · Mi compromiso<\u002Fdiv>\n        <h2 class=\"chapter-title\">Sigamos luchando <em>juntos<\u002Fem>.<\u002Fh2>\n        <p class=\"prose drop-cap\">Quiero que sepas cuánto te valoro y te aprecio. Perdóname si no te lo digo con la frecuencia; por eso aprovecho este momento para dedicarte estas palabras que tanto te mereces.<\u002Fp>\n        <p class=\"prose\">Veo cada vez más cerca el tiempo de avivamiento y mi mayor esperanza es que sigas aquí para mí, así como yo estaré siempre para ti. <em>Mi compromiso inquebrantable es amarte hasta el final, y amarte con pasión.<\u002Fem><\u002Fp>\n        <p class=\"prose\">Deslumbra a todos con tu amor y tu paciencia. Sé ejemplo de los creyentes en <strong>palabra, conducta, amor, espíritu, fe y pureza<\u002Fstrong>.<\u002Fp>\n\n        <div class=\"signature-closer\">\n          <div class=\"closing-line\">Te amo por siempre, tuyo,<\u002Fdiv>\n          <div class=\"big-name\">Esdras<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"page-num\">— fin —<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"controls\">\n  <button id=\"prev\" aria-label=\"Anterior\">◀ Anterior<\u002Fbutton>\n  <div class=\"dots\" id=\"dots\"><\u002Fdiv>\n  <button id=\"next\" aria-label=\"Siguiente\">Siguiente ▶<\u002Fbutton>\n<\u002Fdiv>\n\n<script src=\"7bc13c77-0a0a-483b-9a9a-3a36fb6fe18f\"><\u002Fscript>\n<script>\n  createPetals({\n    count: 16,\n    colors: ['#a97bc9', '#d4b572', '#d4a9e8', '#7c5299'],\n    zIndex: 3\n  });\n\n  const spreads = document.querySelectorAll('.spread');\n  const total = spreads.length;\n  const dotsEl = document.getElementById('dots');\n  const counter = document.getElementById('counter');\n  const prevBtn = document.getElementById('prev');\n  const nextBtn = document.getElementById('next');\n  const book = document.getElementById('book');\n\n  const ROMAN = ['I','II','III','IV','V'];\n  let current = parseInt(localStorage.getItem('carta-book-spread') || '0', 10);\n  if (current >= total) current = 0;\n\n  for (let i = 0; i < total; i++){\n    const d = document.createElement('span');\n    d.className = 'dot';\n    d.addEventListener('click', () => go(i));\n    dotsEl.appendChild(d);\n  }\n\n  function render(){\n    spreads.forEach((s, i) => s.classList.toggle('active', i === current));\n    dotsEl.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i === current));\n    counter.textContent = `Parte ${ROMAN[current]} · ${ROMAN[total-1]}`;\n    prevBtn.disabled = current === 0;\n    nextBtn.disabled = current === total - 1;\n    localStorage.setItem('carta-book-spread', String(current));\n    book.scrollTop = 0;\n    book.querySelectorAll('.page-side').forEach(p => p.scrollTop = 0);\n  }\n\n  function go(i){\n    if (i < 0 || i >= total) return;\n    book.classList.add('turning');\n    setTimeout(() => {\n      current = i;\n      render();\n      book.classList.remove('turning');\n    }, 200);\n  }\n\n  prevBtn.addEventListener('click', () => go(current - 1));\n  nextBtn.addEventListener('click', () => go(current + 1));\n  document.addEventListener('keydown', (e) => {\n    if (e.key === 'ArrowRight') go(current + 1);\n    if (e.key === 'ArrowLeft') go(current - 1);\n  });\n\n  render();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
